<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltioPR - Configuración ESP</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'volti-blue': '#0a192f',
            'volti-accent': '#0db9f2',
            'volti-glow': 'rgba(13, 185, 242, 0.3)',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="p-4 md:p-8 text-sm">
  <div class="bg-animation">
    <div class="absolute top-0 right-0 w-80 h-80 bg-volti-accent opacity-5 rounded-full blur-[100px]"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 bg-volti-accent opacity-5 rounded-full blur-[100px]"></div>
  </div>

  <!-- NAVEGACIÓN PRINCIPAL -->
  <nav class="main-nav max-w-7xl mx-auto px-4 md:px-0">
    <div class="glass-panel rounded-2xl p-3 md:p-4 flex items-center justify-between border-volti-accent/20">
      
      <!-- LOGO Y TÍTULO -->
      <div class="flex items-center space-x-3">
        <img src="logo.png" alt="VoltioPR" class="w-8 h-8 md:w-10 md:h-10 object-contain rounded-full drop-shadow-[0_0_10px_#0db9f2]" />
        <div class="hidden sm:block">
          <h1 class="text-lg md:text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-volti-accent to-white leading-none">
            VOLTIOPR
          </h1>
          <p class="text-[8px] uppercase tracking-widest text-volti-accent opacity-70">Blue Edition</p>
        </div>
      </div>

      <!-- LINKS CENTRALES -->
      <div class="flex items-center gap-6 md:gap-8">
        <a href="dashboard.html" class="nav-link text-xs font-bold uppercase tracking-wider flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Panel
        </a>
        <a href="config.html" class="nav-link active-link text-xs font-bold uppercase tracking-wider flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Pines
        </a>
        <a href="GUIA_DE_IMPLEMENTACION.md" target="_blank" class="nav-link text-xs font-bold uppercase tracking-wider flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.082.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.082.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Ayuda
        </a>
      </div>

      <!-- BOTÓN SALIR -->
      <button id="btn-logout" class="group flex items-center gap-2 bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-500 px-3 py-2 rounded-xl text-xs font-black transition-all hover:scale-105 active:scale-95">
        <span class="hidden md:inline">SALIR</span>
        <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
      </button>

    </div>
  </nav>


  <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 text-white">
    <!-- FORMULARIO DE AGREGAR/EDITAR -->
    <section class="space-y-6">
      <div class="glass-panel rounded-2xl p-6">
        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
          <svg class="w-5 h-5 text-volti-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Nuevo Dispositivo / Pin
        </h2>
        
        <form id="config-form" class="space-y-4">
          <div>
            <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Nombre del Componente</label>
            <input type="text" id="conf-nombre" placeholder="Ej: Motor Bomba" class="w-full bg-white/5 border-white/10 rounded-xl text-white focus:border-volti-accent focus:ring-volti-accent" required />
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">ID (Slug)</label>
              <input type="text" id="conf-id" placeholder="ej: bomba-1" class="w-full bg-white/5 border-white/10 rounded-xl text-white focus:border-volti-accent" required />
            </div>
            <div>
              <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Pin (GPIO)</label>
              <input type="text" id="conf-pin" placeholder="Ej: D1 o GPIO4" class="w-full bg-white/5 border-white/10 rounded-xl text-white focus:border-volti-accent" required />
            </div>
          </div>

          <div>
            <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Tipo de Interfaz</label>
            <select id="conf-tipo" class="w-full bg-slate-900 border-white/10 rounded-xl text-white focus:border-volti-accent">
              <option value="DIGITAL_OUT">Salida Digital (Switch ON/OFF)</option>
              <option value="DIGITAL_IN">Entrada Digital (Sensor Presencia)</option>
              <option value="PWM">Salida PWM (Potencia/Dimer)</option>
              <option value="ANALOG_IN">Entrada Analógica (Sensor Voltaje)</option>
              <option value="SERIAL">Comunicación UART/Serial</option>
              <option value="I2S">Audio / I2S Bus</option>
            </select>
          </div>

          <div>
            <label class="block text-[10px] uppercase font-bold text-slate-400 mb-1">Descripción corta</label>
            <textarea id="conf-desc" rows="2" class="w-full bg-white/5 border-white/10 rounded-xl text-white focus:border-volti-accent"></textarea>
          </div>

          <button type="submit" class="w-full py-3 bg-volti-accent text-volti-blue font-bold rounded-xl shadow-[0_0_20px_rgba(13,185,242,0.3)] hover:brightness-110 border-none transition">
            Guardar Configuración
          </button>
        </form>
      </div>
    </section>

    <!-- LISTADO DE DISPOSITIVOS ACTUALES -->
    <section class="space-y-6">
      <div class="glass-panel rounded-2xl p-6 min-h-[400px]">
        <h2 class="text-lg font-semibold mb-6 flex items-center gap-2">
          <svg class="w-5 h-5 text-volti-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
          Pines Configurados
        </h2>

        <div id="pines-list" class="space-y-3">
          <!-- Se llena dinámicamente -->
          <div class="text-center py-10 opacity-30 italic">
            Cargando dispositivos...
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="app-v2.js"></script>
</body>
</html>
