<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltioPR - Crear Cuenta</title>
  
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            voltio: '#0db9f2',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="styles.css" />

</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white relative">
  
  <!-- NAVEGACIÓN SUPERIOR (Unificado) -->
  <nav class="main-nav w-full max-w-7xl mx-auto px-4 absolute top-0 left-0 right-0 mt-6">
    <div class="glass-panel rounded-2xl p-3 md:p-4 flex items-center justify-between border-volti-accent/20">
      <div class="flex items-center space-x-3">
        <img src="logo.png" alt="VoltioPR" class="w-8 h-8 md:w-10 md:h-10 object-contain rounded-full drop-shadow-[0_0_10px_#0db9f2]" />
        <div>
          <h1 class="text-lg md:text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-volti-accent to-white leading-none">
            VOLTIOPR
          </h1>
          <p class="text-[8px] uppercase tracking-widest text-volti-accent opacity-70">Blue Edition</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest text-white hover:text-volti-accent transition">Entrar</a>
        <span class="w-1 h-1 bg-white/20 rounded-full"></span>
        <a href="GUIA_DE_IMPLEMENTACION.md" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-white/50 hover:text-white transition">Soporte</a>
      </div>
    </div>
  </nav>


  <div class="bg-animation">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-voltio opacity-10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-voltio opacity-5 rounded-full blur-[80px]"></div>
  </div>

  <main class="w-full max-w-md">
    <section class="glass-panel rounded-3xl p-8 md:p-10 relative overflow-hidden">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white tracking-tighter">
          Crear <span class="text-voltio">Cuenta</span>
        </h1>
        <p class="text-gray-400 text-sm mt-2">Ingresa tus datos para unirte a Voltiopr</p>
      </div>

      <!-- Formulario de Registro -->
      <form id="register-form" class="space-y-4">
        
        <!-- Campo: Nombre de Usuario -->
        <div class="space-y-1">
          <label for="reg-username" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Nombre de Usuario</label>
          <input type="text" id="reg-username" name="username" required
            placeholder="ej. piloto_iot"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
        </div>

        <!-- Campo: Correo Electrónico -->
        <div class="space-y-1">
          <label for="reg-email" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Correo Electrónico</label>
          <input type="email" id="reg-email" name="email" required
            placeholder="ejemplo@voltio.com"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
        </div>

        <!-- Campo: Contraseña -->
        <div class="space-y-1">
          <label for="reg-password" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Contraseña</label>
          <div class="relative group">
            <input type="password" id="reg-password" name="password" required minlength="6"
              placeholder="Mínimo 6 caracteres"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pr-12 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-voltio transition-colors" data-target="reg-password">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Campo: Confirmar Contraseña -->
        <div class="space-y-1">
          <label for="reg-password-confirm" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Confirmar Contraseña</label>
          <div class="relative group">
            <input type="password" id="reg-password-confirm" name="password-confirm" required minlength="6"
              placeholder="Repite tu contraseña"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pr-12 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-voltio transition-colors" data-target="reg-password-confirm">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
        </div>

        <p id="reg-error-message" class="text-red-400 text-sm hidden text-center italic mt-2"></p>
        <p id="reg-success-message" class="text-green-400 text-sm hidden text-center italic mt-2"></p>

        <div class="pt-4 flex flex-col gap-3">
          <button type="submit" id="btn-do-register" class="w-full bg-voltio hover:bg-voltio/80 text-white font-bold py-3 rounded-xl transition-all neon-glow">
            Completar Registro
          </button>
          
          <div class="text-center mt-2">
            <span class="text-xs text-gray-400">¿Ya tienes cuenta?</span>
            <a href="index.html" class="text-xs text-white font-bold hover:text-voltio ml-1 transition-colors">
              Volver al Login
            </a>
          </div>
        </div>
      </form>
    </section>
  </main>

  <!-- 
    LÓGICA DE REGISTRO:
    Este archivo "app.js" se encarga de:
    1. Recoger los datos que escribiste (Nombre, Email, Clave).
    2. Guardarlos de forma permanente en la base de datos de Cloudflare.
    3. Mandarte de regreso a la pantalla de Inicio (Login) cuando termines.
  -->
  <script type="module" src="app-v2.js"></script>
</body>
</html>
