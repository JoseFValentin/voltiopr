<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltioPR - Login</title>
  
  <!-- Tailwind CSS: Carga el diseño base y herramientas (versión para no programadores) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Configuración de colores oficiales de la marca Voltio -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            voltio: '#0db9f2', /* Azul neón característico */
          }
        }
      }
    }
  </script>

  <!-- Importar nuestro archivo de estilos principal -->
  <link rel="stylesheet" href="styles.css" />


</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white relative">
  
  <!-- NAVEGACIÓN SUPERIOR (Unificado) -->
  <nav class="main-nav w-full max-w-7xl mx-auto px-4 absolute top-0 left-0 right-0 mt-3">
    <div class="glass-panel rounded-xl p-2 md:p-3 flex items-center justify-between border-volti-accent/20">
      <div class="flex items-center space-x-3">
        <img src="logo.png" alt="VoltioPR" class="w-12 h-12 md:w-14 md:h-14 object-contain drop-shadow-[0_0_15px_#0db9f2] hover:scale-110 transition-transform duration-300 rounded-lg" />
        <div>
          <h1 class="text-lg md:text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-volti-accent to-white leading-none">
            VOLTIOPR
          </h1>
          <p class="text-[8px] uppercase tracking-widest text-volti-accent opacity-70">Blue Edition</p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <a href="register.html" class="text-[10px] font-bold uppercase tracking-widest text-white hover:text-volti-accent transition">Registrarse</a>
        <span class="w-1 h-1 bg-white/20 rounded-full"></span>
        <a href="GUIA_DE_IMPLEMENTACION.md" target="_blank" class="text-[10px] font-bold uppercase tracking-widest text-white/50 hover:text-white transition">Soporte</a>
      </div>
    </div>
  </nav>


  <!-- Detalles visuales de fondo (luces borrosas) -->
  <div class="bg-animation">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-voltio opacity-10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-voltio opacity-5 rounded-full blur-[80px]"></div>
  </div>

  <main class="w-full max-w-md">
    <!-- Contenedor transparente (glassmorphism) -->
    <section class="glass-panel rounded-2xl p-6 md:p-8 relative overflow-hidden">
      
      <!-- Logo y Título -->
      <div class="text-center mb-6">
        <h1 class="text-2xl font-bold text-white tracking-tighter">
          Bienvenido
        </h1>
        <p class="text-gray-400 text-xs mt-1">Blue Edition • IoT Control Panel</p>
      </div>

      <!-- Formulario de Inicio de Sesión -->
      <form id="login-form" class="space-y-5">
        
        <!-- Campo: Correo Electrónico (Requerido para cuentas normales y recuperación) -->
        <div class="space-y-1">
          <label for="email" class="text-[10px] font-semibold text-gray-300 uppercase tracking-wider ml-1">Correo Electrónico</label>
          <input type="email" id="email" name="email" required
            placeholder="ejemplo@voltio.com"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-xs text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
        </div>

        <!-- Campo: Contraseña -->
        <div class="space-y-1">
          <label for="password" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Contraseña</label>
          <div class="relative group">
            <input type="password" id="password" name="password" required
              placeholder="••••••••"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pr-12 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-voltio transition-colors" data-target="password">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Enlace: Recuperar Contraseña -->
        <div class="flex justify-end pr-1">
            <!-- Botón tipo texto que ejecuta la solicitud de recuperación -->
            <button type="button" id="btn-forgot-password" class="text-xs text-voltio hover:text-white transition-colors">
              ¿Olvidaste tu contraseña?
            </button>
        </div>

        <!-- Mensaje de estado/error (oculto por defecto) -->
        <p id="error-message" class="text-red-400 text-xs hidden text-center italic mt-2"></p>
        <!-- Mensaje de éxito (oculto por defecto) -->
        <p id="success-message" class="text-green-400 text-xs hidden text-center italic mt-2"></p>

        <!-- Botones Principales (Login y Registro) -->
        <div class="pt-2 flex flex-col gap-3">
          <button type="submit" id="btn-login" class="w-full bg-voltio hover:bg-voltio/80 text-white font-bold py-3 rounded-xl transition-all neon-glow">
            Iniciar Sesión
          </button>
          
          <!-- Botón de crear cuenta nueva -->
          <div class="text-center mt-2">
            <span class="text-xs text-gray-400">¿No tienes cuenta?</span>
            <a href="register.html" class="text-xs text-white font-bold hover:text-voltio ml-1 transition-colors">
              Crear una ahora
            </a>
          </div>
        </div>

        <!-- Divisor visual -->
        <div class="flex items-center my-4">
          <div class="flex-grow border-t border-white/10"></div>
          <span class="px-3 text-xs text-gray-500 uppercase tracking-widest">O entrar con</span>
          <div class="flex-grow border-t border-white/10"></div>
        </div>

        <!-- Botón: Iniciar Sesión con Google -->
        <button type="button" id="btn-google" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium py-2 rounded-xl flex items-center justify-center gap-2 text-xs transition-all relative overflow-hidden group">
          <!-- Icono de Google SVG -->
          <svg class="w-4 h-4 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
          </svg>
          Google
        </button>
      </form>

    </section>

    <!-- Pie de página -->
    <p class="text-center text-white/20 text-[10px] mt-4 uppercase tracking-widest">
      © 2026 Voltiopr.com - IoT Control
    </p>
  </main>

  <!-- 
    ESTA ES LA LÓGICA DE PROGRAMACIÓN (EL CEREBRO):
    Aquí cargamos el archivo "app.js" que es el que se encarga de:
    1. Revisar si el correo y clave que escribiste son correctos.
    2. Mandar la orden al servidor para dejarte entrar.
    3. Guardar tu sesión para que no tengas que loguearte a cada rato.
    "type=module" significa que es un archivo moderno y organizado.
  -->
  <script type="module" src="app-v2.js"></script>
</body>
</html>
