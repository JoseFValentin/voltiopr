<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltioPR - Login</title>
  
  <!-- Tailwind CSS: Carga el diseño base y herramientas (versión para no programadores) -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  
  <!-- Configuración de colores oficiales de la marca Voltio -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            voltio: '#0db9f2', /* Azul neón característico */
          }
        }
      }
    }
  </script>

  <!-- Importar nuestro archivo de estilos principal -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Supabase JS CDN: Esta es la "magia" que conecta con la base de datos real -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white relative">
  
  <!-- Encabezado Superior Izquierdo -->
  <header class="absolute top-6 left-6 flex items-center gap-3 z-50">
    <img src="logo.png" alt="VoltioPR Logo" class="w-10 h-10 md:w-12 md:h-12 object-contain mix-blend-screen rounded-full drop-shadow-[0_0_15px_#0db9f2]" />
    <span class="text-xl md:text-2xl font-extrabold tracking-tight text-white">
      VOLTIO<span class="text-voltio">PR</span>
    </span>
  </header>

  <!-- Detalles visuales de fondo (luces borrosas) -->
  <div class="bg-animation">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-voltio opacity-10 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-voltio opacity-5 rounded-full blur-[80px]"></div>
  </div>

  <main class="w-full max-w-md">
    <!-- Contenedor transparente (glassmorphism) -->
    <section class="glass-panel rounded-3xl p-8 md:p-10 relative overflow-hidden">
      
      <!-- Logo y Título -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white tracking-tighter">
          Bienvenido
        </h1>
        <p class="text-gray-400 text-sm mt-2">Blue Edition • IoT Control Panel</p>
      </div>

      <!-- Formulario de Inicio de Sesión -->
      <form id="login-form" class="space-y-5">
        
        <!-- Campo: Correo Electrónico (Requerido para cuentas normales y recuperación) -->
        <div class="space-y-1">
          <label for="email" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Correo Electrónico</label>
          <input type="email" id="email" name="email" required
            placeholder="ejemplo@voltio.com"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
        </div>

        <!-- Campo: Contraseña -->
        <div class="space-y-1">
          <label for="password" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Contraseña</label>
          <input type="password" id="password" name="password" required
            placeholder="••••••••"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
        </div>

        <!-- Enlace: Recuperar Contraseña -->
        <div class="flex justify-end pr-1">
            <!-- Botón tipo texto que ejecuta la solicitud de recuperación -->
            <button type="button" id="btn-forgot-password" class="text-xs text-voltio hover:text-white transition-colors">
              ¿Olvidaste tu contraseña?
            </button>
        </div>

        <!-- Mensaje de estado/error (oculto por defecto) -->
        <p id="error-message" class="text-red-400 text-sm hidden text-center italic mt-2"></p>
        <!-- Mensaje de éxito (oculto por defecto) -->
        <p id="success-message" class="text-green-400 text-sm hidden text-center italic mt-2"></p>

        <!-- Botones Principales (Login y Registro) -->
        <div class="pt-2 flex flex-col gap-3">
          <button type="submit" id="btn-login" class="w-full bg-voltio hover:bg-voltio/80 text-white font-bold py-3 rounded-xl transition-all neon-glow">
            Iniciar Sesión
          </button>
          
          <!-- Botón de crear cuenta nueva -->
          <div class="text-center mt-2">
            <span class="text-xs text-gray-400">¿No tienes cuenta?</span>
            <a href="register.html" class="text-xs text-white font-bold hover:text-voltio ml-1 transition-colors">
              Crear una ahora
            </a>
          </div>
        </div>

        <!-- Divisor visual -->
        <div class="flex items-center my-4">
          <div class="flex-grow border-t border-white/10"></div>
          <span class="px-3 text-xs text-gray-500 uppercase tracking-widest">O entrar con</span>
          <div class="flex-grow border-t border-white/10"></div>
        </div>

        <!-- Botón: Iniciar Sesión con Google -->
        <button type="button" id="btn-google" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white font-medium py-3 rounded-xl flex items-center justify-center gap-3 transition-all relative overflow-hidden group">
          <!-- Icono de Google SVG -->
          <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
          </svg>
          Google
        </button>
      </form>

    </section>

    <!-- Pie de página -->
    <p class="text-center text-white/20 text-xs mt-6 uppercase tracking-widest">
      © 2026 Voltiopr.com - IoT Control
    </p>
  </main>

  <!-- Lógica de Javascript para Supabase y Login -->
  <!-- Esto es un módulo para poder usar variables compartidas o librerías externas -->
  <script type="module" src="app.js"></script>
</body>
</html>
