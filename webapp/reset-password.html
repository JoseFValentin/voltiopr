<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltioPR - Restaurar Contraseña</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            voltio: '#0db9f2',
            'volti-accent': '#0db9f2',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white relative">
  
  <!-- NAVEGACIÓN -->
  <nav class="main-nav w-full max-w-7xl mx-auto px-4 absolute top-0 left-0 right-0 mt-6">
    <div class="glass-panel rounded-xl p-2 md:p-4 flex items-center justify-between border-volti-accent/20">
      <div class="flex items-center space-x-3">
        <img src="logo.png" alt="VoltioPR" class="w-8 h-8 md:w-10 md:h-10 object-contain rounded-full drop-shadow-[0_0_10px_#0db9f2]" />
        <div>
          <h1 class="text-lg md:text-xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-volti-accent to-white leading-none">
            VOLTIOPR
          </h1>
          <p class="text-[8px] uppercase tracking-widest text-volti-accent opacity-70">Security Center</p>
        </div>
      </div>
      <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest text-white hover:text-volti-accent transition">Volver al Login</a>
    </div>
  </nav>

  <div class="bg-animation">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-voltio opacity-10 rounded-full blur-[120px]"></div>
  </div>

  <main class="w-full max-w-md">
    <section class="glass-panel rounded-3xl p-8 md:p-10 relative overflow-hidden">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white tracking-tighter">Nueva Contraseña</h1>
        <p class="text-gray-400 text-xs mt-2">Ingresa el código que recibiste por email</p>
      </div>

      <form id="reset-password-form" class="space-y-5">
        <!-- Email (Read Only para seguridad) -->
        <div class="space-y-1">
          <label for="reset-email" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Tu Correo</label>
          <input type="email" id="reset-email" name="email" required readonly
            class="w-full bg-white/5 border border-white/5 rounded-xl px-4 py-3 text-white/50 cursor-not-allowed" />
        </div>

        <!-- Código de recuperación -->
        <div class="space-y-1">
          <label for="reset-token" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Código de Seguridad</label>
          <input type="text" id="reset-token" name="token" required
            placeholder="ABC123XY"
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all text-center font-mono tracking-widest uppercase" />
        </div>

        <!-- Nueva Contraseña -->
        <div class="space-y-1">
          <label for="new-password" class="text-xs font-semibold text-gray-300 uppercase tracking-wider ml-1">Nueva Contraseña</label>
          <div class="relative group">
            <input type="password" id="new-password" name="newPassword" required
              placeholder="••••••••"
              class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 pr-12 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-voltio/50 focus:border-voltio transition-all" />
            <button type="button" class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-voltio transition-colors" data-target="new-password">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
              </svg>
            </button>
          </div>
        </div>

        <p id="reset-error-message" class="text-red-400 text-xs hidden text-center italic mt-2"></p>
        <p id="reset-success-message" class="text-green-400 text-xs hidden text-center italic mt-2"></p>

        <button type="submit" class="w-full bg-voltio hover:bg-voltio/80 text-white font-bold py-3 rounded-xl transition-all neon-glow mt-4">
          Actualizar Contraseña
        </button>
      </form>
    </section>
  </main>

  <script type="module" src="app-v2.js"></script>
</body>
</html>
