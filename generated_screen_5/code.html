<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Recuperar Contraseña - Voltiopr.com</title>
<!-- Tailwind CSS v3 con plugins de formularios y consultas de contenedor -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter para una tipografía limpia y futurista -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            voltio: '#0db9f2', // Azul Neón solicitado
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<!-- BEGIN: Custom Styles -->
<style data-purpose="glassmorphism-and-bg">
    /* Fondo oscuro y profundo para resaltar el estilo futurista */
    body {
      background: radial-gradient(circle at center, #051923 0%, #000000 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Estilo de Vidrio (Glassmorphism) para el contenedor central */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }

    /* Efecto de resplandor neón para elementos activos */
    .neon-glow:focus {
      box-shadow: 0 0 15px rgba(13, 185, 242, 0.5);
      border-color: #0db9f2;
    }

    /* Animación sutil de fondo */
    .bg-animation {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #0db9f2;
      filter: blur(150px);
      opacity: 0.15;
      z-index: -1;
      border-radius: 50%;
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="antialiased text-white font-sans">
<!-- Luces decorativas de fondo -->
<div class="bg-animation top-[-100px] left-[-100px]"></div>
<div class="bg-animation bottom-[-100px] right-[-100px]"></div>
<!-- BEGIN: PasswordRecoveryCard -->
<!-- Este es el contenedor principal que flota en el centro de la pantalla -->
<main class="w-full max-w-md p-6 sm:p-8" data-purpose="recovery-container">
<section class="glass-card rounded-3xl p-8 md:p-10 flex flex-col items-center">
<!-- BEGIN: Header -->
<!-- Sección superior con el logo o nombre del sitio -->
<header class="mb-10 text-center" data-purpose="brand-header">
<h1 class="text-3xl font-extrabold tracking-tighter mb-2">
          VOLTIO<span class="text-voltio">PR</span>
</h1>
<p class="text-gray-400 text-sm font-light">
          Recuperación de acceso segura
        </p>
</header>
<!-- END: Header -->
<!-- BEGIN: RecoveryForm -->
<!-- Formulario principal para ingresar el correo electrónico -->
<form action="#" class="w-full space-y-6" data-purpose="recovery-form" method="POST">
<div class="space-y-2">
<!-- Etiqueta del campo de correo -->
<label class="block text-xs font-semibold text-voltio uppercase tracking-widest ml-1" for="email">
            Correo Electrónico
          </label>
<!-- Entrada de texto con estilo minimalista y transparente -->
<input class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 transition-all duration-300 neon-glow focus:ring-0 focus:outline-none" id="email" name="email" placeholder="ejemplo@correo.com" required="" type="email"/>
<p class="text-[10px] text-gray-500 mt-1 ml-1">
            Enviaremos un enlace único para restablecer tu contraseña.
          </p>
</div>
<!-- Botón de acción con efecto de hover neón -->
<button class="w-full bg-voltio hover:bg-[#0aa8db] text-black font-bold py-3.5 rounded-xl transition-all duration-300 transform hover:scale-[1.02] active:scale-95 shadow-[0_0_20px_rgba(13,185,242,0.3)]" data-purpose="submit-button" type="submit">
          Enviar Enlace de Restablecimiento
        </button>
</form>
<!-- END: RecoveryForm -->
<!-- BEGIN: FooterLinks -->
<!-- Enlace para volver a la pantalla de inicio de sesión -->
<footer class="mt-8 text-center" data-purpose="form-navigation">
<a class="text-sm text-gray-400 hover:text-voltio transition-colors duration-300 flex items-center justify-center gap-2 group" href="/login">
<svg class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          Volver a Iniciar Sesión
        </a>
</footer>
<!-- END: FooterLinks -->
</section>
<!-- Pequeño pie de página externo -->
<p class="text-center text-gray-600 text-[11px] mt-8 uppercase tracking-[0.2em]">
      © 2024 Voltiopr.com • Edición Blue 4K
    </p>
</main>
<!-- END: PasswordRecoveryCard -->
</body></html>
